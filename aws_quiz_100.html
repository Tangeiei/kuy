<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Cloud Practitioner — 100 ข้อ</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e3a5f;
  --accent:#00d4ff; --accent2:#ff6b35; --accent3:#7c3aed;
  --success:#10b981; --danger:#ef4444; --warning:#f59e0b;
  --text:#e2e8f0; --muted:#64748b; --glow:0 0 20px rgba(0,212,255,.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(0,212,255,.05) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(124,58,237,.05) 0%,transparent 50%);}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ico{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent3));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--glow);}
.logo-t{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:1px;}
.logo-s{font-size:11px;color:var(--muted);}
.hdr-stats{display:flex;gap:14px;align-items:center;}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;
  font-size:13px;display:flex;align-items:center;gap:6px;}
.pill span{color:var(--accent);font-weight:700;font-family:'JetBrains Mono',monospace;}

/* PROGRESS */
.prog-sec{padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
.prog-info{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--muted);}
.prog-wrap{background:var(--surface2);border-radius:10px;height:7px;overflow:hidden;border:1px solid var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:10px;transition:width .5s ease;box-shadow:var(--glow);}

/* MAIN */
.main{max-width:820px;margin:0 auto;padding:28px 20px;}

/* STREAK */
.streak{display:flex;gap:3px;margin-bottom:16px;flex-wrap:wrap;}
.s-dot{width:18px;height:18px;border-radius:3px;background:var(--surface2);border:1px solid var(--border);transition:all .3s;}
.s-dot.c{background:var(--success);border-color:var(--success);}
.s-dot.w{background:var(--danger);border-color:var(--danger);}
.s-dot.cur{border-color:var(--accent);box-shadow:0 0 6px rgba(0,212,255,.5);}

/* QUESTION CARD */
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;
  margin-bottom:16px;animation:slideIn .35s ease;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent3));}
@keyframes slideIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap;}
.qbadge{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(124,58,237,.15));border:1px solid var(--accent);
  color:var(--accent);border-radius:7px;padding:3px 11px;font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.mtag{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:3px 11px;font-size:11px;}
.qtxt{font-size:17px;font-weight:500;line-height:1.65;margin-bottom:20px;}
.mhint{font-size:12px;color:var(--warning);margin-bottom:12px;}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:13px 16px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text);}
.opt:hover:not(.dis){border-color:var(--accent);background:rgba(0,212,255,.05);transform:translateX(3px);}
.opt.sel{border-color:var(--accent);background:rgba(0,212,255,.1);}
.opt.cor{border-color:var(--success);background:rgba(16,185,129,.1);animation:cpulse .5s ease;}
.opt.wrg{border-color:var(--danger);background:rgba(239,68,68,.1);animation:wshake .4s ease;}
.opt.msd{border-color:var(--warning);background:rgba(245,158,11,.1);}
.opt.dis{cursor:not-allowed;}
@keyframes cpulse{0%{transform:scale(1);}50%{transform:scale(1.01);}100%{transform:scale(1);}}
@keyframes wshake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.olet{width:28px;height:28px;border-radius:7px;background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:700;flex-shrink:0;transition:all .2s;}
.opt.sel .olet{background:var(--accent);border-color:var(--accent);color:#000;}
.opt.cor .olet{background:var(--success);border-color:var(--success);color:#fff;}
.opt.wrg .olet{background:var(--danger);border-color:var(--danger);color:#fff;}
.opt.msd .olet{background:var(--warning);border-color:var(--warning);color:#000;}
.oico{margin-left:auto;font-size:16px;}

/* EXPLANATION */
.exp{margin-top:16px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;
  padding:18px;display:none;animation:fadeIn .3s ease;}
.exp.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.exph{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:600;font-size:14px;}
.exph.ec{color:var(--success);} .exph.ew{color:var(--danger);}
.expt{font-size:13px;line-height:1.7;color:var(--muted);}

/* ACTIONS */
.acts{display:flex;gap:10px;margin-top:20px;}
.btn{flex:1;padding:13px;border-radius:11px;border:none;font-family:'Kanit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-chk{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;box-shadow:var(--glow);}
.btn-chk:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,255,.4);}
.btn-chk:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-nxt{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.btn-nxt:hover{border-color:var(--accent);color:var(--accent);}

/* START PAGE */
#start-page{text-align:center;padding:50px 16px;}
.sh{font-size:44px;margin-bottom:12px;}
.st{font-size:32px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,var(--accent),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ss{font-size:15px;color:var(--muted);margin-bottom:36px;}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:32px;text-align:left;}
.mod-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.mc-num{font-size:10px;color:var(--muted);margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
.mc-name{font-size:12px;font-weight:500;}
.mc-cnt{font-size:11px;color:var(--accent);margin-top:3px;}
.start-opts{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
.sog label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
.sog select{background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:8px 12px;font-family:'Kanit',sans-serif;font-size:13px;cursor:pointer;}
.btn-start{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border:none;
  border-radius:13px;padding:15px 48px;font-size:17px;font-weight:700;cursor:pointer;
  font-family:'Kanit',sans-serif;box-shadow:var(--glow);transition:all .2s;}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,212,255,.5);}

/* RESULT */
#result-page{display:none;}
.res-wrap{text-align:center;padding:36px 16px;}
.res-circ{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;position:relative;box-shadow:0 0 40px rgba(0,212,255,.3);}
.res-inner{width:114px;height:114px;border-radius:50%;background:var(--surface);
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
.res-pct{font-size:28px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.res-plbl{font-size:10px;color:var(--muted);}
.res-title{font-size:26px;font-weight:700;margin-bottom:6px;}
.res-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.rs{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
.rs-n{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:3px;}
.rs-l{font-size:12px;color:var(--muted);}
.res-lv{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:22px;}
.lv-badge{display:inline-block;padding:5px 18px;border-radius:18px;font-weight:700;font-size:15px;margin-bottom:10px;}
.lv-desc{font-size:13px;color:var(--muted);line-height:1.65;}
.res-mod-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:22px;text-align:left;}
.rmb-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--accent);}
.rmb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rmb-name{font-size:12px;color:var(--muted);width:160px;flex-shrink:0;}
.rmb-bar-wrap{flex:1;background:var(--surface2);border-radius:6px;height:10px;overflow:hidden;}
.rmb-bar{height:100%;border-radius:6px;transition:width 1s ease;}
.rmb-score{font-size:12px;font-family:'JetBrains Mono',monospace;width:40px;text-align:right;}
.btn-rs{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border:none;
  border-radius:12px;padding:14px 36px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Kanit',sans-serif;box-shadow:var(--glow);transition:all .2s;margin:0 6px;}
.btn-rs:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,255,.4);}
.btn-rs-o{background:transparent;color:var(--accent);border:1px solid var(--accent);
  border-radius:12px;padding:14px 36px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Kanit',sans-serif;transition:all .2s;margin:0 6px;}
.btn-rs-o:hover{background:rgba(0,212,255,.1);}
@media(max-width:600px){.hdr-stats{display:none;}.qtxt{font-size:15px;}.main{padding:14px;}.res-stats{grid-template-columns:1fr 1fr;}.rmb-name{width:100px;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-ico">☁️</div>
    <div><div class="logo-t">AWS QUIZ</div><div class="logo-s">Cloud Practitioner · 100 ข้อ</div></div>
  </div>
  <div class="hdr-stats" id="hdr-stats" style="display:none">
    <div class="pill">✅ <span id="sc">0</span></div>
    <div class="pill">❌ <span id="sw">0</span></div>
    <div class="pill">🎯 <span id="sp">0%</span></div>
  </div>
</div>

<div class="main">

<!-- START -->
<div id="start-page">
  <div class="sh">☁️</div>
  <div class="st">AWS Cloud Practitioner Quiz</div>
  <div class="ss">ครบ 100 ข้อ · 10 โมดูล · สุ่มข้อทุกครั้ง · เฉลยพร้อมคำอธิบาย</div>
  <div class="mod-grid" id="mod-grid"></div>
  <div class="start-opts">
    <div class="sog"><label>จำนวนข้อ</label>
      <select id="qc"><option value="10">10 ข้อ</option><option value="20">20 ข้อ</option>
        <option value="50">50 ข้อ</option><option value="100" selected>100 ข้อ (ทั้งหมด)</option></select>
    </div>
    <div class="sog"><label>โมดูล</label>
      <select id="mf"><option value="0">ทุกโมดูล</option>
        <option value="1">M1 · Cloud Basics</option><option value="2">M2 · Pricing</option>
        <option value="3">M3 · Infrastructure</option><option value="4">M4 · Security</option>
        <option value="5">M5 · Networking</option><option value="6">M6 · Compute</option>
        <option value="7">M7 · Storage</option><option value="8">M8 · Databases</option>
        <option value="9">M9 · Well-Architected</option><option value="10">M10 · Monitoring</option>
      </select>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">🚀 เริ่มทำแบบทดสอบ</button>
</div>

<!-- QUIZ -->
<div id="quiz-page" style="display:none">
  <div class="prog-sec" style="margin:-28px -20px 20px;padding:12px 20px;">
    <div class="prog-info"><span id="pgt">ข้อ 1 จาก 100</span><span id="psc">คะแนน: 0/0</span></div>
    <div class="prog-wrap"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
  </div>
  <div class="streak" id="streak"></div>
  <div id="qcon"></div>
</div>

<!-- RESULT -->
<div id="result-page">
  <div class="res-wrap" id="res-con"></div>
</div>

</div>

<script>
const MN={1:"Cloud Computing Basics",2:"Pricing & Billing",3:"Global Infrastructure",
  4:"Security",5:"Networking (VPC)",6:"Compute (EC2/Lambda)",7:"Storage (S3/EBS)",
  8:"Databases",9:"Well-Architected",10:"Auto Scaling & Monitoring"};

const Q=[
// ═══════════════════════════ MODULE 1 — Cloud Computing Basics ═══════════════════════════
{m:1,q:"รูปแบบการกำหนดราคาตามความต้องการจริงของ AWS เรียกว่าอะไร?",t:"s",
 o:["Pay as you go","Subscription Model","Reserved Pricing","Spot Pricing"],a:[0],
 e:"Pay as you go = จ่ายเฉพาะที่ใช้จริง ไม่มีค่าธรรมเนียมล่วงหน้า หยุดใช้เมื่อไหร่ก็หยุดจ่ายเมื่อนั้น"},

{m:1,q:"ข้อใดต่อไปนี้ ไม่ใช่ โมเดล Cloud Computing?",t:"s",
 o:["IaaS (Infrastructure as a Service)","PaaS (Platform as a Service)","SaaS (Software as a Service)","System Administration as a Service"],a:[3],
 e:"โมเดล Cloud Computing มี 3 รูปแบบ: IaaS, PaaS, SaaS — ไม่มี System Administration as a Service"},

{m:1,q:"AWS เป็นเจ้าของฮาร์ดแวร์ และลูกค้า Provision ทรัพยากรเองผ่าน Console/API — ถูกหรือผิด?",t:"s",
 o:["ถูก (True)","ผิด (False)"],a:[0],
 e:"ถูกต้อง! AWS ซื้อและดูแลฮาร์ดแวร์ทั้งหมด ลูกค้าเพียงใช้งานทรัพยากรผ่าน Management Console, CLI หรือ SDKs"},

{m:1,q:"ข้อใดต่อไปนี้ไม่ใช่ประโยชน์หลักของ Cloud Computing?",t:"s",
 o:["ลดต้นทุน Capital Expenditure","ปรับขนาดได้ยืดหยุ่น","จ่ายค่าจัดวางและติดตั้งเซิร์ฟเวอร์เอง","เข้าถึงได้ทั่วโลก"],a:[2],
 e:"การจ่ายค่าจัดวางและติดตั้งเซิร์ฟเวอร์เองเป็นลักษณะของ On-premises ไม่ใช่ Cloud Computing"},

{m:1,q:"วิธีเข้าถึง AWS มีอะไรบ้าง? (เลือก 3 ข้อ)",t:"m",
 o:["AWS Management Console","AWS CLI (Command Line Interface)","AWS SDKs","AWS Hardware Dongle"],a:[0,1,2],
 e:"AWS รองรับ 3 วิธีหลัก — Management Console (GUI), CLI (Command Line) และ SDKs (โปรแกรมมิ่ง) ไม่มี Hardware Dongle"},

{m:1,q:"Economies of Scale บน AWS เกิดจากอะไร?",t:"s",
 o:["AWS ลงทุนในเทคโนโลยีใหม่","ลูกค้าหลายแสนรายรวมกันใช้ Infrastructure เดียวกัน","AWS ใช้พลังงานหมุนเวียน","AWS มีพนักงานน้อย"],a:[1],
 e:"เมื่อลูกค้าหลายแสนรายใช้ Infrastructure ร่วมกัน ต้นทุนต่อหน่วยลดลง AWS จึงส่งผ่านราคาถูกลงให้ลูกค้า"},

{m:1,q:"บริการ Compute Service หลักของ AWS คืออะไร?",t:"s",
 o:["Amazon S3","Amazon EC2","Amazon RDS","Amazon VPC"],a:[1],
 e:"Amazon EC2 (Elastic Compute Cloud) เป็นบริการ Compute หลักของ AWS ให้บริการ Virtual Machines บนคลาวด์"},

{m:1,q:"ข้อใดต่อไปนี้ไม่ใช่ข้อดีของ AWS Cloud? (เลือก 2 ข้อ)",t:"m",
 o:["ต้องผ่าน Multiple Procurement Cycles","เพิ่ม High Latency","ปรับขนาดได้ตามความต้องการ","ลดต้นทุน Infrastructure"],a:[0,1],
 e:"Multiple Procurement Cycles (กระบวนการจัดซื้อหลายขั้นตอน) และ High Latency ไม่ใช่ข้อดี แต่เป็นปัญหาของ Traditional IT"},

{m:1,q:"Cloud Deployment Model แบบ Hybrid Cloud คืออะไร?",t:"s",
 o:["ใช้ Cloud Provider หลายเจ้า","รวม On-premises กับ Public Cloud เข้าด้วยกัน","ใช้เฉพาะ Private Cloud","ใช้เฉพาะ Public Cloud"],a:[1],
 e:"Hybrid Cloud คือการรวม On-premises infrastructure กับ Public Cloud เข้าด้วยกัน เชื่อมต่อกันผ่าน Network"},

{m:1,q:"ลักษณะสำคัญของ Cloud Computing ตาม NIST คืออะไร? (เลือก 2 ข้อ)",t:"m",
 o:["On-demand self-service","Dedicated physical hardware","Measured service (จ่ายตามใช้)","Manual provisioning only"],a:[0,2],
 e:"NIST กำหนดลักษณะ Cloud Computing 5 ข้อ รวมถึง On-demand self-service (จัดการได้เอง) และ Measured service (จ่ายตามที่ใช้จริง)"},

// ═══════════════════════════ MODULE 2 — Pricing & Billing ═══════════════════════════
{m:2,q:"ตัวเลือก Reserved Instances มีอะไรบ้าง? (เลือก 3 ข้อ)",t:"m",
 o:["AURI — All Upfront Reserved Instance","PURI — Partial Upfront Reserved Instance","NURI — No Upfront Reserved Instance","FURI — Full Upfront Reserved Instance"],a:[0,1,2],
 e:"Reserved Instances มี 3 แบบ — All Upfront (จ่ายเต็มล่วงหน้า), Partial Upfront (จ่ายบางส่วน), No Upfront (ไม่จ่ายล่วงหน้า)"},

{m:2,q:"เครื่องมือใดใช้ดูรายละเอียดค่าใช้จ่าย EC2 ย้อนหลัง 3 เดือน?",t:"s",
 o:["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Trusted Advisor"],a:[0],
 e:"AWS Cost Explorer ดูข้อมูลค่าใช้จ่ายย้อนหลังได้ถึง 12 เดือน และพยากรณ์ล่วงหน้าได้ 3 เดือน"},

{m:2,q:"Reserved Instances ต้องจ่ายเต็มจำนวนล่วงหน้าเสมอ — ถูกหรือผิด?",t:"s",
 o:["ถูก (True)","ผิด (False)"],a:[1],
 e:"ผิด! Reserved Instances มี 3 ตัวเลือกการชำระ — All Upfront, Partial Upfront และ No Upfront"},

// ─── Engine ───
let quiz=[], idx=0, score=0, answered=0, hist=[], modScores={};
let sel=new Set();

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startQuiz(){
  const mf=parseInt(document.getElementById('mf').value);
  const qc=document.getElementById('qc').value;
  let pool=mf===0?[...Q]:Q.filter(q=>q.m===mf);
  pool=shuffle(pool);
  if(qc!=='100')pool=pool.slice(0,parseInt(qc));
  quiz=pool.map(q=>({...q,opts:shuffle(q.o.map((t,i)=>({t,correct:q.a.includes(i)})))}));
  idx=0;score=0;answered=0;hist=[];sel=new Set();
  modScores={};
  for(let m=1;m<=10;m++)modScores[m]={c:0,t:0};
  document.getElementById('start-page').style.display='none';
  document.getElementById('quiz-page').style.display='block';
  document.getElementById('hdr-stats').style.display='flex';
  render();updateStreak();
}

function render(){
  const q=quiz[idx];
  const L=['A','B','C','D','E','F'];
  const multi=q.t==='m';
  let opts=q.opts.map((o,i)=>`
    <div class="opt" id="o${i}" onclick="${multi?`tog(${i})`:`pick(${i})`}">
      <div class="olet" id="ol${i}">${L[i]}</div>
      <span>${o.t}</span>
      <span class="oico" id="oi${i}"></span>
    </div>`).join('');
  document.getElementById('qcon').innerHTML=`
    <div class="qcard">
      <div class="qmeta">
        <div class="qbadge">Q${idx+1} / ${quiz.length}</div>
        <div class="mtag">Module ${q.m} · ${MN[q.m]}</div>
      </div>
      <div class="qtxt">${q.q}</div>
      ${multi?'<div class="mhint">⚠️ เลือกได้หลายข้อ</div>':''}
      <div class="opts">${opts}</div>
      <div class="exp" id="exp"></div>
      <div class="acts">
        <button class="btn btn-chk" id="bchk" onclick="check()" disabled>✓ ตรวจคำตอบ</button>
        <button class="btn btn-nxt" id="bnxt" onclick="next()" style="display:none">
          ${idx<quiz.length-1?'ข้อถัดไป →':'ดูผลสรุป 🎯'}
        </button>
      </div>
    </div>`;
  updateProg();
}

function pick(i){
  sel=new Set([i]);
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  document.getElementById(`o${i}`).classList.add('sel');
  document.getElementById('bchk').disabled=false;
}

function tog(i){
  sel.has(i)?sel.delete(i):sel.add(i);
  document.querySelectorAll('.opt').forEach((o,x)=>{
    sel.has(x)?o.classList.add('sel'):o.classList.remove('sel');
  });
  document.getElementById('bchk').disabled=sel.size===0;
}

function check(){
  const q=quiz[idx];
  const cIdxs=q.opts.map((o,i)=>o.correct?i:-1).filter(i=>i>=0);
  const ok=sel.size===cIdxs.length&&[...sel].every(s=>cIdxs.includes(s));
  document.querySelectorAll('.opt').forEach(o=>{o.classList.add('dis');o.onclick=null;});
  q.opts.forEach((o,i)=>{
    const el=document.getElementById(`o${i}`),ico=document.getElementById(`oi${i}`);
    if(o.correct&&sel.has(i)){el.classList.remove('sel');el.classList.add('cor');ico.textContent='✅';}
    else if(!o.correct&&sel.has(i)){el.classList.remove('sel');el.classList.add('wrg');ico.textContent='❌';}
    else if(o.correct&&!sel.has(i)){el.classList.add('msd');ico.textContent='⬆️';}
  });
  if(ok)score++;
  answered++;
  hist.push(ok);
  modScores[q.m].t++;
  if(ok)modScores[q.m].c++;
  const exp=document.getElementById('exp');
  exp.className='exp show';
  exp.innerHTML=`<div class="exph ${ok?'ec':'ew'}">${ok?'✅ ถูกต้อง!':'❌ ไม่ถูกต้อง'}</div>
    <div class="expt">${q.e}</div>`;
  document.getElementById('bchk').style.display='none';
  document.getElementById('bnxt').style.display='block';
  updateStats();updateStreak();
}

function next(){
  sel=new Set();
  if(idx<quiz.length-1){idx++;render();}
  else showResult();
}

function updateProg(){
  const p=(idx/quiz.length)*100;
  document.getElementById('pfill').style.width=p+'%';
  document.getElementById('pgt').textContent=`ข้อ ${idx+1} จาก ${quiz.length}`;
  document.getElementById('psc').textContent=`คะแนน: ${score}/${answered}`;
}

function updateStats(){
  const w=answered-score,p=answered>0?Math.round(score/answered*100):0;
  document.getElementById('sc').textContent=score;
  document.getElementById('sw').textContent=w;
  document.getElementById('sp').textContent=p+'%';
  document.getElementById('psc').textContent=`คะแนน: ${score}/${answered}`;
  document.getElementById('pfill').style.width=((idx+1)/quiz.length*100)+'%';
}

function updateStreak(){
  document.getElementById('streak').innerHTML=quiz.map((_,i)=>{
    let cls=i<hist.length?(hist[i]?'c':'w'):'';
    if(i===idx&&!cls)cls='cur';
    return `<div class="s-dot ${cls}" title="ข้อ ${i+1}"></div>`;
  }).join('');
}

function showResult(){
  document.getElementById('quiz-page').style.display='none';
  document.getElementById('result-page').style.display='block';
  const total=quiz.length,pct=Math.round(score/total*100),wrong=total-score;
  let lv,lc,ld;
  if(pct>=90){lv='🏆 พร้อมสอบระดับ Expert';lc='var(--success)';ld='ยอดเยี่ยม! คุณมีความพร้อมสูงมากในการสอบ AWS Cloud Practitioner ผ่านเกณฑ์ 90% ขึ้นไป!';}
  else if(pct>=75){lv='🌟 เกือบพร้อมแล้ว';lc='var(--accent)';ld='ทำได้ดีมาก! ทบทวนโมดูลที่ยังอ่อนเพิ่มเติม โดยเฉพาะข้อที่ตอบผิด แล้วลองทำซ้ำ';}
  else if(pct>=60){lv='📚 ต้องทบทวนเพิ่ม';lc='var(--warning)';ld='ผ่านเกณฑ์ขั้นต้น แต่ควรทบทวนเนื้อหาให้ครบก่อนสอบจริง เน้นโมดูลที่คะแนนต่ำ';}
  else{lv='💪 ต้องฝึกเพิ่มอีก';lc='var(--danger)';ld='ยังต้องศึกษาเพิ่มเติม กลับไปอ่านเนื้อหาแต่ละ Module ให้เข้าใจก่อนทำข้อสอบใหม่';}

  // Module breakdown
  const modKeys=Object.keys(modScores).filter(m=>modScores[m].t>0);
  let breakdown=modKeys.map(m=>{
    const {c,t}=modScores[m];
    const mp=t>0?Math.round(c/t*100):0;
    const barColor=mp>=80?'var(--success)':mp>=60?'var(--warning)':'var(--danger)';
    return `<div class="rmb-row">
      <div class="rmb-name">M${m}·${MN[m].split(' ')[0]}</div>
      <div class="rmb-bar-wrap"><div class="rmb-bar" style="width:${mp}%;background:${barColor}"></div></div>
      <div class="rmb-score" style="color:${barColor}">${c}/${t}</div>
    </div>`;
  }).join('');

  document.getElementById('res-con').innerHTML=`
    <div class="res-circ" style="background:conic-gradient(var(--accent) ${pct*3.6}deg,var(--surface2) 0);box-shadow:0 0 40px rgba(0,212,255,.3)">
      <div class="res-inner"><div class="res-pct">${pct}%</div><div class="res-plbl">คะแนน</div></div>
    </div>
    <div class="res-title">ผลการทำแบบทดสอบ</div>
    <div class="res-sub">ทำข้อสอบ ${total} ข้อเสร็จแล้ว!</div>
    <div class="res-stats">
      <div class="rs"><div class="rs-n" style="color:var(--success)">${score}</div><div class="rs-l">✅ ถูกต้อง</div></div>
      <div class="rs"><div class="rs-n" style="color:var(--danger)">${wrong}</div><div class="rs-l">❌ ผิด</div></div>
      <div class="rs"><div class="rs-n" style="color:var(--accent)">${total}</div><div class="rs-l">📝 ทั้งหมด</div></div>
    </div>
    <div class="res-lv">
      <div class="lv-badge" style="background:${lc}20;color:${lc};border:1px solid ${lc}">${lv}</div>
      <div class="lv-desc">${ld}</div>
    </div>
    ${modKeys.length>1?`<div class="res-mod-breakdown"><div class="rmb-title">📊 คะแนนแยกตามโมดูล</div>${breakdown}</div>`:''}
    <div>
      <button class="btn-rs" onclick="restart()">🔄 ทำใหม่ (สุ่มข้อใหม่)</button>
      <button class="btn-rs-o" onclick="goHome()">🏠 เลือก Module</button>
    </div>`;
}

function restart(){document.getElementById('result-page').style.display='none';startQuiz();}
function goHome(){
  document.getElementById('result-page').style.display='none';
  document.getElementById('quiz-page').style.display='none';
  document.getElementById('start-page').style.display='block';
  document.getElementById('hdr-stats').style.display='none';
}

// Init
window.onload=()=>{
  const g=document.getElementById('mod-grid');
  for(let m=1;m<=10;m++){
    const cnt=Q.filter(q=>q.m===m).length;
    g.innerHTML+=`<div class="mod-card"><div class="mc-num">MODULE ${m}</div>
      <div class="mc-name">${MN[m]}</div><div class="mc-cnt">${cnt} ข้อ</div></div>`;
  }
};
</script>
</body>
</html>
